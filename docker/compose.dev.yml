services:
  radar:
    container_name: tdt-radar-dev
    image: alphabet2006/tdt-radar:latest
    pull_policy: never
    user: "0:0"
    group_add:
      - "0"
    network_mode: host
    ipc: host
    gpus: all
    environment:
      DISPLAY: ${DISPLAY:-:0}
      QT_X11_NO_MITSHM: "1"
      XAUTHORITY: /tmp/.Xauthority
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      LOCAL_UID: ${LOCAL_UID:-1000}
      LOCAL_GID: ${LOCAL_GID:-1000}
      USBFS_MEMORY_MB: ${USBFS_MEMORY_MB:-2000}
    working_dir: /workspace/T-DT_Radar
    volumes:
      - ..:/workspace/T-DT_Radar
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/tmp/.Xauthority:rw
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    devices:
      - /dev/bus/usb
    privileged: true
    command: ["/bin/bash", "-lc", "sleep infinity"]
    stdin_open: true
    tty: true

  radar_user:
    image: alphabet2006/tdt-radar:latest
    pull_policy: never
    profiles:
      - user
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    group_add:
      - "0"
    network_mode: host
    ipc: host
    gpus: all
    environment:
      DISPLAY: ${DISPLAY:-:0}
      QT_X11_NO_MITSHM: "1"
      XAUTHORITY: /tmp/.Xauthority
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      LOCAL_UID: ${LOCAL_UID:-1000}
      LOCAL_GID: ${LOCAL_GID:-1000}
      USBFS_MEMORY_MB: ${USBFS_MEMORY_MB:-2000}
      HOME: /tmp
    working_dir: /workspace/T-DT_Radar
    volumes:
      - ..:/workspace/T-DT_Radar
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/tmp/.Xauthority:rw
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    devices:
      - /dev/bus/usb
    privileged: true
    command: ["/bin/bash", "-lc", "sleep infinity"]
    stdin_open: true
    tty: true
